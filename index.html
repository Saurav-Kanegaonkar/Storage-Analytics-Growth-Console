<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Storage Analytics Growth Console</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="lab">
    <header class="lab-header">
      <p class="label">Ecommerce Experimentation</p>
      <h1>Storage Analytics Growth Console</h1>
      <p>Connect demand, tracking QA, inventory constraints, and campaign ROI before deciding which growth experiment deserves traffic.</p>
    </header>
    <section class="funnel" id="funnel"></section>
    <section class="matrix-wrap">
      <article class="matrix-card">
        <p class="label">Experiment priority matrix</p>
        <div id="matrix" class="matrix"></div>
      </article>
      <article class="experiment-card">
        <p class="label">Selected experiment</p>
        <h2 id="experiment-title"></h2>
        <p id="experiment-hypothesis"></p>
        <div id="experiment-metrics" class="experiment-metrics"></div>
      </article>
    </section>
    <section class="readout">
      <article>
        <p class="label">What the data says</p>
        <div id="insights"></div>
      </article>
      <article>
        <p class="label">Recommendation</p>
        <div id="recommendations"></div>
      </article>
    </section>
  </main>
  <script src="src/data.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
